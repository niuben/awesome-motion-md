<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Material Expressive Preview</title>
    <style>
      :root {
        --ease: cubic-bezier(0.38, 1.21, 0.22, 1);
        --enter: cubic-bezier(0.42, 1.67, 0.21, 0.9);
        --exit: cubic-bezier(0.34, 0.8, 0.34, 1);
        --fast: 150ms;
        --default: 500ms;
        --slow: 650ms;
        --bg: #fff7fb;
        --fg: #231722;
        --muted: #736272;
        --surface: rgba(255, 255, 255, 0.82);
        --line: rgba(35, 23, 34, 0.12);
        --accent: #7c3aed;
        --accent2: #ff4fa3;
        --font: Roboto, Inter, system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--fg);
        font-family: var(--font);
      }
      button,
      input {
        font: 800 14px var(--font);
      }
      button {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--fg);
        color: var(--bg);
        padding: 12px 18px;
        cursor: pointer;
        box-shadow: 0 14px 36px
          color-mix(in srgb, var(--accent) 18%, transparent);
        transition:
          transform var(--fast) var(--ease),
          background var(--fast),
          border-color var(--fast),
          box-shadow var(--fast);
      }
      button:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
        box-shadow: 0 20px 54px
          color-mix(in srgb, var(--accent) 24%, transparent);
      }
      button:active {
        transform: scale(0.97);
      }
      button.secondary {
        background: transparent;
        color: var(--fg);
        box-shadow: none;
      }
      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .lede {
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
        max-width: 680px;
      }
      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-top: 24px;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: var(--fg);
        padding: 12px;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }
      body {
        background:
          radial-gradient(
            circle at 20% 5%,
            rgba(255, 79, 163, 0.25),
            transparent 28rem
          ),
          #fff7fb;
      }
      .material {
        max-width: 1160px;
        margin: auto;
        padding: 52px 22px;
      }
      .hero-card {
        border-radius: 42px;
        background: var(--surface);
        padding: 28px;
        box-shadow: 0 30px 100px rgba(124, 58, 237, 0.16);
        transform: translateY(24px) scale(0.96);
        opacity: 0;
        animation: settle var(--default) var(--ease) both;
      }
      .morph {
        height: 190px;
        border-radius: 48px;
        background: linear-gradient(
          135deg,
          var(--accent2),
          var(--accent),
          #28d6a0
        );
        animation: morph var(--slow) var(--ease) infinite alternate;
      }
      .components {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 18px;
      }
      .surface {
        border: 1px solid var(--line);
        border-radius: 34px;
        background: var(--surface);
        padding: 20px;
        transition:
          transform var(--default) var(--ease),
          border-radius var(--default) var(--enter),
          box-shadow var(--fast) var(--exit);
      }
      .surface:hover {
        transform: translateY(-6px) scale(1.01);
        border-radius: 44px;
        box-shadow: 0 30px 90px rgba(255, 79, 163, 0.2);
      }
      .switch {
        width: 64px;
        height: 36px;
        border-radius: 99px;
        background: #d8c8f4;
        padding: 5px;
      }
      .knob {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: white;
        transition: transform 350ms var(--enter);
      }
      .switch.on .knob {
        transform: translateX(28px);
      }
      .fab {
        position: fixed;
        right: 22px;
        bottom: 22px;
        border-radius: 24px;
        width: 66px;
        height: 66px;
      }
      .fab-menu {
        position: fixed;
        right: 22px;
        bottom: 98px;
        display: grid;
        gap: 10px;
        opacity: 0;
        transform: translateY(20px) scale(0.94);
        transition: all var(--default) var(--ease);
      }
      .fab-menu.open {
        opacity: 1;
        transform: none;
      }
      @keyframes settle {
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes morph {
        to {
          border-radius: 76px 38px 68px 42px;
          transform: translateY(-8px) scale(1.025);
        }
      }
      @media (max-width: 800px) {
        .components {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="material">
      <section class="hero-card">
        <p class="eyebrow">Material Expressive</p>
        <h1>Spatial tokens move objects.</h1>
        <p class="lede">
          Effects tokens handle color, shadow, opacity, and focus without
          overshooting.
        </p>
        <div class="morph"></div>
      </section>
      <section class="components">
        <article class="surface">
          <h2>Card</h2>
          <p>Default spatial spring, hover lift -6px.</p>
        </article>
        <article class="surface">
          <h2>Switch</h2>
          <button class="switch on" data-switch>
            <span class="knob"></span>
          </button>
        </article>
        <article class="surface">
          <h2>Dialog</h2>
          <p>Opacity, scale .94 to 1, y 24px.</p>
        </article>
      </section>
    </main>
    <div class="fab-menu">
      <button>Menu</button><button>Toast</button><button>Sheet</button>
    </div>
    <button class="fab" data-fab>+</button>
    <script>
      document.querySelector("[data-switch]").onclick = (e) =>
        e.currentTarget.classList.toggle("on");
      document.querySelector("[data-fab]").onclick = () =>
        document.querySelector(".fab-menu").classList.toggle("open");
    </script>
  </body>
</html>
