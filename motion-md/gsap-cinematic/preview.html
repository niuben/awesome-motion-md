<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GSAP Cinematic Preview</title>
    <style>
      :root {
        --ease: cubic-bezier(0.77, 0, 0.175, 1);
        --enter: cubic-bezier(0.16, 1, 0.3, 1);
        --exit: cubic-bezier(0.7, 0, 0.84, 0);
        --fast: 180ms;
        --default: 800ms;
        --slow: 1600ms;
        --bg: #090909;
        --fg: #f5efe7;
        --muted: #b8aaa0;
        --surface: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.16);
        --accent: #ff4d2e;
        --accent2: #f5efe7;
        --font: Inter, Helvetica, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--fg);
        font-family: var(--font);
      }
      button,
      input {
        font: 800 14px var(--font);
      }
      button {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--fg);
        color: var(--bg);
        padding: 12px 18px;
        cursor: pointer;
        box-shadow: 0 14px 36px
          color-mix(in srgb, var(--accent) 18%, transparent);
        transition:
          transform var(--fast) var(--ease),
          background var(--fast),
          border-color var(--fast),
          box-shadow var(--fast);
      }
      button:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
        box-shadow: 0 20px 54px
          color-mix(in srgb, var(--accent) 24%, transparent);
      }
      button:active {
        transform: scale(0.97);
      }
      button.secondary {
        background: transparent;
        color: var(--fg);
        box-shadow: none;
      }
      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .lede {
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
        max-width: 680px;
      }
      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-top: 24px;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: var(--fg);
        padding: 12px;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }
      body {
        background: #090909;
      }
      .film {
        max-width: 1180px;
        margin: auto;
        padding: 50px 22px;
      }
      .scene {
        min-height: 78vh;
        display: grid;
        align-content: center;
        border-bottom: 1px solid var(--line);
      }
      .line {
        display: block;
        overflow: hidden;
      }
      .line span {
        display: block;
        font-size: clamp(54px, 9vw, 116px);
        line-height: 0.86;
        letter-spacing: -0.07em;
        animation: line var(--default) var(--ease) both;
      }
      .line:nth-child(2) span {
        animation-delay: 80ms;
      }
      .mask-visual {
        height: 360px;
        border-radius: 0;
        background: linear-gradient(135deg, var(--accent), #23110c);
        clip-path: inset(0 100% 0 0);
        animation: mask var(--default) var(--ease) 360ms both;
      }
      .cinema-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .cinema-card {
        overflow: hidden;
        border: 1px solid var(--line);
        background: var(--surface);
        padding: 20px;
        perspective: 800px;
        transition: transform var(--default) var(--enter);
      }
      .cinema-card:hover {
        transform: translateY(-8px) rotateX(4deg) rotateY(-5deg);
      }
      .wipe {
        height: 120px;
        background: var(--accent);
        transform-origin: left;
        animation: wipe var(--default) var(--ease) both;
      }
      .magnetic {
        transition: transform var(--fast);
      }
      .magnetic:hover {
        transform: translateY(-8px);
      }
      @keyframes line {
        from {
          opacity: 0;
          transform: translateY(110%);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes mask {
        to {
          clip-path: inset(0);
        }
      }
      @keyframes wipe {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }
      @media (max-width: 800px) {
        .cinema-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="film">
      <section class="scene">
        <p class="eyebrow">GSAP Cinematic</p>
        <h1>
          <span class="line"><span>Directed</span></span
          ><span class="line"><span>motion beats.</span></span>
        </h1>
        <p class="lede">
          Timeline sequencing, masks, staged text, and one dominant direction.
        </p>
        <button class="magnetic">Magnetic CTA</button>
      </section>
      <section class="scene"><div class="mask-visual"></div></section>
      <section class="scene cinema-grid">
        <article class="cinema-card">
          <div class="wipe"></div>
          <h2>Card tilt</h2>
          <p>3D tilt with media zoom and overlay reveal.</p>
        </article>
        <article class="cinema-card">
          <div class="wipe"></div>
          <h2>Timeline</h2>
          <p>Steps animate sequentially, not simultaneously.</p>
        </article>
      </section>
    </main>
    <script></script>
  </body>
</html>
